{% extends "base.html" %}

{% block title %}Удаление {{ object_type }}{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">
                    <h3 class="mb-0">Подтверждение удаления</h3>
                </div>
                <div class="card-body">
                    <p>Вы уверены, что хотите удалить этот {{ object_type }}?</p>
                    {% if object.text %}
                        <div class="alert alert-secondary">
                            <strong>Текст:</strong><br>
                            {{ object.text|truncatewords:30 }}
                        </div>
                    {% endif %}
                    <form method="post">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger">Удалить</button>
                        <a href="{% url cancel_url post_id=post_id %}" class="btn btn-secondary">Отмена</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
